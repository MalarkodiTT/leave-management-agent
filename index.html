<!DOCTYPE html>
<html lang="en">
    <head>
    <title>My Awesome Project</title> </head>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .glow { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-900 via-black to-black">

    <div id="authContainer" class="flex items-center justify-center min-h-screen">
        <div id="loginBox" class="glass p-10 rounded-3xl w-96 shadow-[0_0_80px_-12px_rgba(59,130,246,0.5)] border border-white/10">
            <h2 class="text-4xl font-extrabold mb-8 text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-cyan-400 to-blue-500">Employee Login</h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-950/50 rounded-xl border border-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all outline-none">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-gray-950/50 rounded-xl border border-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all outline-none">
            <button onclick="login()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-[1.02] transition-transform py-4 rounded-xl font-bold text-lg shadow-[0_0_20px_rgba(37,99,235,0.4)]">Sign In</button>
            <p class="mt-6 text-center text-gray-400">No account? <span onclick="showRegister()" class="text-cyan-400 cursor-pointer hover:underline decoration-cyan-400">Register</span></p>
        </div>

        <div id="registerBox" class="hidden glass p-10 rounded-3xl w-96 shadow-[0_0_80px_-12px_rgba(168,85,247,0.5)] border border-white/10">
            <h2 class="text-4xl font-extrabold mb-8 text-center bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-400 to-purple-500">Register</h2>
            <input id="regEmail" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-950/50 rounded-xl border border-gray-800 focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all outline-none">
            <input id="regPass" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-gray-950/50 rounded-xl border border-gray-800 focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all outline-none">
            <button onclick="register()" class="w-full bg-gradient-to-r from-purple-600 to-pink-500 hover:scale-[1.02] transition-transform py-4 rounded-xl font-bold text-lg shadow-[0_0_20px_rgba(147,51,234,0.4)]">Register</button>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <div class="w-72 glass p-6 border-r border-white/10">
            <h1 class="text-3xl font-black mb-12 bg-clip-text text-transparent bg-gradient-to-br from-blue-400 to-purple-500 tracking-tighter">LeavePortal</h1>
            <nav class="space-y-4">
                <button onclick="showSection('chat')" class="w-full text-left text-lg p-4 hover:bg-white/5 rounded-xl transition-all border-l-4 border-transparent hover:border-blue-500 flex items-center gap-3">Dashboard</button>
                <button onclick="showSection('profile')" class="w-full text-left text-lg p-4 hover:bg-white/5 rounded-xl transition-all border-l-4 border-transparent hover:border-purple-500 flex items-center gap-3">Profile</button>
                <button onclick="showSection('history')" class="w-full text-left text-lg p-4 hover:bg-white/5 rounded-xl transition-all border-l-4 border-transparent hover:border-pink-500 flex items-center gap-3">History</button>
            </nav>
        </div>

        <div class="flex-1 p-10 overflow-y-auto">
            <div id="chatSection" class="w-full max-w-[1000px] mx-auto glass p-8 rounded-3xl border border-purple-500/20 shadow-[0_0_50px_-12px_rgba(168,85,247,0.2)]">
                <h2 class="text-3xl font-bold mb-6 bg-clip-text text-transparent bg-gradient-to-r from-purple-300 to-indigo-300">Leave Request</h2>
                <textarea id="reason" class="w-full h-40 p-5 bg-black/40 rounded-2xl mb-4 border border-white/10 focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition-all outline-none" placeholder="Reason for leave..."></textarea>
                <button onclick="submitLeave()" class="w-full bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 py-4 rounded-xl font-bold text-lg hover:scale-[1.01] transition-transform">Ask AI Agent</button>
                <div id="result" class="mt-6 p-6 bg-black/30 rounded-2xl border border-white/5 text-gray-300">Waiting for input...</div>
            </div>

            <div id="profileSection" class="hidden max-w-2xl mx-auto glass p-8 rounded-3xl border border-blue-500/20">
                <h2 class="text-3xl font-bold mb-8 text-blue-300">User Profile</h2>
                <p id="profileMail" class="mb-8 text-blue-400 font-mono bg-blue-950/20 p-4 rounded-xl border border-blue-900/30"></p>
                <div class="space-y-4">
                    <input id="oldPass" type="password" placeholder="Old Password" class="w-full p-4 bg-black/40 rounded-xl border border-white/10 focus:border-blue-500 outline-none">
                    <input id="newPass" type="password" placeholder="New Password" class="w-full p-4 bg-black/40 rounded-xl border border-white/10 focus:border-blue-500 outline-none">
                    <button onclick="updatePassword()" class="bg-gradient-to-r from-blue-600 to-cyan-600 px-6 py-4 rounded-xl w-full font-bold hover:scale-[1.01] transition-transform">Change Password</button>
                </div>
            </div>

            <div id="historySection" class="hidden max-w-2xl mx-auto glass p-8 rounded-3xl border border-pink-500/20">
                <h2 class="text-3xl font-bold mb-6 text-pink-300">Leave History</h2>
                <div id="historyList" class="space-y-4"></div>
            </div>
        </div>

        <div class="w-80 glass p-6 border-l border-white/10">
            <h2 class="text-xl font-bold mb-6 text-yellow-400">July 2026</h2>
            <div class="grid grid-cols-7 gap-1 text-center text-sm">
                <span class="text-gray-600">Su</span><span class="text-gray-600">Mo</span><span class="text-gray-600">Tu</span><span class="text-gray-600">We</span><span class="text-gray-600">Th</span><span class="text-gray-600">Fr</span><span class="text-gray-600">Sa</span>
                <script>for(let i=1; i<=31; i++) document.write(`<div class="p-2 bg-white/5 hover:bg-yellow-500 hover:text-black rounded-lg cursor-pointer transition-all font-semibold">${i}</div>`);</script>
            </div>
        </div>
    </div>

    <script>
        let userData = { email: "", password: "" };
        let history = [];

        function showRegister() { document.getElementById('loginBox').classList.add('hidden'); document.getElementById('registerBox').classList.remove('hidden'); }
        
        function register() {
            userData.email = document.getElementById('regEmail').value;
            userData.password = document.getElementById('regPass').value;
            alert("Registered!");
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById('loginBox').classList.remove('hidden');
        }

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(email === userData.email && pass === userData.password) {
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('profileMail').innerText = "Logged in as: " + email;
            } else { alert("Invalid email or password!"); }
        }

        function updatePassword() {
            const oldP = document.getElementById('oldPass').value;
            const newP = document.getElementById('newPass').value;
            if(oldP === userData.password) {
                userData.password = newP;
                alert("Password changed successfully!");
            } else { alert("Old password incorrect!"); }
        }

        function showSection(id) {
            document.getElementById('chatSection').classList.add('hidden');
            document.getElementById('profileSection').classList.add('hidden');
            document.getElementById('historySection').classList.add('hidden');
            document.getElementById(id + 'Section').classList.remove('hidden');
        }

        async function submitLeave() {
            const reason = document.getElementById('reason').value;
            const res = await fetch('http://localhost:3000/api/analyze-leave', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ reason, email: userData.email })
            });
            const data = await res.json();
            history.push({ reason, decision: data.decision, date: new Date().toLocaleDateString() });
            
            document.getElementById('result').innerHTML = `<p class="text-cyan-400 font-bold text-lg">${data.decision}</p><p class="mt-2">${data.reason}</p>`;
            
            const list = document.getElementById('historyList');
            list.innerHTML = history.map(item => `<div class="p-4 bg-black/40 border border-white/5 rounded-xl">${item.date}: ${item.reason} - <span class="text-green-400 font-bold block mt-1">${item.decision}</span></div>`).join('');
        }
    </script>
</body>
</html>
